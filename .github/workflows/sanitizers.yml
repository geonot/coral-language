name: Sanitizers

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: llvm-tools-preview
      - name: Install rust-src for sanitizer
        run: rustup component add rust-src --toolchain nightly
      - name: Build and test with ASAN (runtime)
        env:
          RUSTFLAGS: "-Zsanitizer=address"
        run: cargo +nightly test -p runtime --tests --target x86_64-unknown-linux-gnu -Zsanitizer=address

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: miri
      - name: Miri test runtime
        run: |
          cargo +nightly miri setup
          cargo +nightly miri test -p runtime
